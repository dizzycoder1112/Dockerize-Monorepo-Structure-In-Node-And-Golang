services:
  ts-restful-api:
    build:
      context: ./
      dockerfile: apps/ts-restful-api/Dockerfile.local
    expose:
      - '3000'
    env_file:
      - ./apps/ts-restful-api/.env
    volumes:
      - ./apps/ts-restful-api/src:/app/apps/ts-restful-api/src
      - ./ts-packages:/app/ts-packages
    networks:
      - app-network

  ts-grpc-demo:
    build:
      context: ./
      dockerfile: apps/ts-grpc-demo/Dockerfile.local
    expose:
      - '3000'
    env_file:
      - ./apps/ts-grpc-demo/.env
    volumes:
      - ./apps/ts-grpc-demo/src:/app/apps/ts-grpc-demo/src
      - ./ts-packages:/app/ts-packages
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
