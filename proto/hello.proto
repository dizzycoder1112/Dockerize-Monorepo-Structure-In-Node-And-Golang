// proto/helloworld.proto
syntax = "proto3";

package helloworld;

option go_package = "dizzycoder1112/Dockerize-Monorepo-Structure-In-Node-And-Golang/grpc/pb/hello";

service Greeter {
  rpc SayHello(HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}